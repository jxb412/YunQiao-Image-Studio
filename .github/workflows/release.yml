name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npx electron-builder --win portable --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
      - uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: release/*.exe
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npx electron-builder --mac dmg --${{ matrix.arch }} --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
      - uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}-dmg
          path: release/*.dmg
          if-no-files-found: error

  publish-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build-windows
      - build-macos
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Rename assets
        run: |
          mkdir -p release-assets
          find artifacts -maxdepth 3 -type f -print
          cp artifacts/windows-portable/*.exe release-assets/YunQiao-Image-Studio-${GITHUB_REF_NAME#v}-win-x64-portable.exe
          cp artifacts/macos-x64-dmg/*.dmg release-assets/YunQiao-Image-Studio-${GITHUB_REF_NAME#v}-mac-x64.dmg
          cp artifacts/macos-arm64-dmg/*.dmg release-assets/YunQiao-Image-Studio-${GITHUB_REF_NAME#v}-mac-arm64.dmg
      - name: Generate update manifest
        env:
          UPDATE_PUBLIC_BASE_URL: ${{ vars.UPDATE_PUBLIC_BASE_URL }}
        run: |
          PUBLIC_BASE_URL="${UPDATE_PUBLIC_BASE_URL:-https://down.haowucm.cn}"
          node scripts/create-update-manifest.mjs \
            --version "${GITHUB_REF_NAME#v}" \
            --tag "${GITHUB_REF_NAME}" \
            --asset-dir release-assets \
            --public-base-url "${PUBLIC_BASE_URL}" \
            --repo "${GITHUB_REPOSITORY}" \
            --output release-assets/latest.json
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: YunQiao Image Studio ${{ github.ref_name }}
          files: release-assets/*
          draft: false
          prerelease: false
          generate_release_notes: true
      - name: Upload website update mirror
        env:
          SSH_HOST: ${{ secrets.UPDATE_SSH_HOST }}
          SSH_PORT: ${{ secrets.UPDATE_SSH_PORT }}
          SSH_USER: ${{ secrets.UPDATE_SSH_USER }}
          SSH_PASSWORD: ${{ secrets.UPDATE_SSH_PASSWORD }}
          SSH_REMOTE_ROOT: ${{ secrets.UPDATE_SSH_REMOTE_ROOT }}
        run: |
          set -euo pipefail
          SSH_PORT="${SSH_PORT:-22}"
          SSH_REMOTE_ROOT="${SSH_REMOTE_ROOT:-/www/wwwroot/down.haowucm.cn}"
          if [ -z "${SSH_HOST:-}" ] || [ -z "${SSH_USER:-}" ] || [ -z "${SSH_PASSWORD:-}" ]; then
            echo "SSH mirror secrets are not configured; skip website mirror upload."
            exit 0
          fi

          sudo apt-get update
          sudo apt-get install -y sshpass
          export SSHPASS="${SSH_PASSWORD}"

          SSH_OPTIONS=(-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -p "${SSH_PORT}")
          SCP_OPTIONS=(-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -P "${SSH_PORT}")
          SSH_TARGET="${SSH_USER}@${SSH_HOST}"

          sshpass -e ssh "${SSH_OPTIONS[@]}" "${SSH_TARGET}" \
            "mkdir -p '${SSH_REMOTE_ROOT}/releases/${GITHUB_REF_NAME}' '${SSH_REMOTE_ROOT}/yunqiao/releases/${GITHUB_REF_NAME}'"

          for file in release-assets/*; do
            [ -f "${file}" ] || continue
            filename="$(basename "${file}")"
            [ "${filename}" = "latest.json" ] && continue
            sshpass -e scp "${SCP_OPTIONS[@]}" "${file}" \
              "${SSH_TARGET}:${SSH_REMOTE_ROOT}/releases/${GITHUB_REF_NAME}/${filename}"
          done

          sshpass -e scp "${SCP_OPTIONS[@]}" release-assets/latest.json \
            "${SSH_TARGET}:${SSH_REMOTE_ROOT}/latest.json"
          sshpass -e scp "${SCP_OPTIONS[@]}" release-assets/latest.json \
            "${SSH_TARGET}:${SSH_REMOTE_ROOT}/releases/${GITHUB_REF_NAME}/latest.json"
          sshpass -e scp "${SCP_OPTIONS[@]}" release-assets/latest.json \
            "${SSH_TARGET}:${SSH_REMOTE_ROOT}/yunqiao/latest.json"
          sshpass -e scp "${SCP_OPTIONS[@]}" release-assets/latest.json \
            "${SSH_TARGET}:${SSH_REMOTE_ROOT}/yunqiao/releases/${GITHUB_REF_NAME}/latest.json"
